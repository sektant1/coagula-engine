<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" role="img" aria-labelledby="crypt-title crypt-desc">
  <title id="crypt-title">PLACEHOLDER — The Crypt (Build section)</title>
  <desc id="crypt-desc">Arched stone doorway with iron bands and glowing green keyhole. Replace with final section art.</desc>
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1730"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <radialGradient id="keyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6fe07a"/>
      <stop offset="100%" stop-color="#6fe07a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="180" fill="url(#stone)"/>
  <!-- stone blocks -->
  <g fill="#2a2140" stroke="#0a0818" stroke-width="1">
    <rect x="0"   y="0"  width="80"  height="36"/>
    <rect x="80"  y="0"  width="80"  height="36"/>
    <rect x="160" y="0"  width="80"  height="36"/>
    <rect x="240" y="0"  width="80"  height="36"/>
    <rect x="320" y="0"  width="80"  height="36"/>
    <rect x="400" y="0"  width="80"  height="36"/>
    <rect x="0"   y="144" width="80" height="36"/>
    <rect x="80"  y="144" width="80" height="36"/>
    <rect x="160" y="144" width="80" height="36"/>
    <rect x="240" y="144" width="80" height="36"/>
    <rect x="320" y="144" width="80" height="36"/>
    <rect x="400" y="144" width="80" height="36"/>
  </g>
  <!-- archway -->
  <path d="M160,180 L160,100 Q160,50 240,50 Q320,50 320,100 L320,180 Z" fill="#05040c" stroke="#3a2f5c" stroke-width="2"/>
  <!-- iron bands -->
  <g stroke="#1a1430" stroke-width="3" fill="none">
    <path d="M160,140 Q240,130 320,140"/>
    <path d="M160,110 Q240,95 320,110"/>
  </g>
  <!-- keyhole glow -->
  <circle cx="240" cy="125" r="22" fill="url(#keyGlow)"/>
  <path d="M240,115 a4,4 0 1,0 0.1,0 L238,132 L242,132 Z" fill="#6fe07a"/>
  <!-- torches -->
  <g fill="#c43a3a">
    <rect x="112" y="70" width="6" height="40" fill="#3a2f5c"/>
    <path d="M115,68 Q108,55 115,45 Q122,55 115,68 Z"/>
    <rect x="362" y="70" width="6" height="40" fill="#3a2f5c"/>
    <path d="M365,68 Q358,55 365,45 Q372,55 365,68 Z"/>
  </g>
</svg>
