<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 220" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">PLACEHOLDER — Coagula Engine banner</title>
  <desc id="banner-desc">Gallowmere-style moonlit graveyard: full moon, purple sky, gravestones, bare trees. Replace with final banner art.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0c36"/>
      <stop offset="55%" stop-color="#2a1248"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0ead0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#b89ad8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7a3bc2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fe07a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6fe07a" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="220" fill="url(#sky)"/>

  <!-- Moon glow -->
  <circle cx="1280" cy="70" r="140" fill="url(#moonGlow)"/>
  <circle cx="1280" cy="70" r="42" fill="#f4eed6"/>
  <circle cx="1268" cy="62" r="8"  fill="#c0b8a0" opacity="0.6"/>
  <circle cx="1294" cy="80" r="5"  fill="#c0b8a0" opacity="0.5"/>

  <!-- Stars -->
  <g fill="#eae6d3" opacity="0.8">
    <circle cx="120"  cy="40"  r="1.2"/>
    <circle cx="260"  cy="70"  r="1"/>
    <circle cx="420"  cy="30"  r="1.4"/>
    <circle cx="560"  cy="90"  r="1"/>
    <circle cx="740"  cy="50"  r="1.2"/>
    <circle cx="900"  cy="30"  r="1"/>
    <circle cx="1080" cy="80"  r="1.3"/>
    <circle cx="1440" cy="45"  r="1.1"/>
  </g>

  <!-- Bare trees silhouette -->
  <g fill="#05040c" opacity="0.95">
    <path d="M0,220 L0,150 Q30,120 45,140 Q55,100 70,120 Q75,90 90,120 Q100,140 120,150 L120,220 Z"/>
    <path d="M1500,220 L1500,130 Q1520,100 1540,120 Q1555,85 1570,115 Q1580,95 1600,120 L1600,220 Z"/>
  </g>

  <!-- Gravestones -->
  <g fill="#1a1430">
    <rect x="140" y="160" width="46" height="60" rx="4"/>
    <rect x="210" y="150" width="32" height="70"/>
    <path d="M280,220 L280,150 Q280,135 295,135 Q310,135 310,150 L310,220 Z"/>
    <rect x="350" y="170" width="28" height="50"/>
    <path d="M420,220 L420,140 Q420,125 440,125 Q460,125 460,140 L460,220 Z"/>
    <rect x="1080" y="165" width="38" height="55"/>
    <path d="M1160,220 L1160,145 Q1160,130 1178,130 Q1196,130 1196,145 L1196,220 Z"/>
    <rect x="1240" y="170" width="30" height="50"/>
  </g>
  <!-- Cross on center grave -->
  <g fill="#1a1430">
    <rect x="595" y="120" width="10" height="100"/>
    <rect x="575" y="145" width="50" height="10"/>
  </g>

  <!-- Fog -->
  <rect x="0" y="140" width="1600" height="80" fill="url(#fog)"/>

  <!-- Ground -->
  <rect x="0" y="210" width="1600" height="10" fill="#05040c"/>
</svg>
