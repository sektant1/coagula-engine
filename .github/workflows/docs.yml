name: Deploy Doxygen to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  BUILD_DIR: build/docs
  HTML_OUT:  build/docs/docs/html

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Doxygen + Graphviz + CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz cmake

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Configure (fetches doxygen-awesome-css via CMake FetchContent)
        run: |
          cmake -B "${BUILD_DIR}" -S . \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=OFF \
                -DMONAD_DOCS_ONLY=ON

      - name: Tag PROJECT_NUMBER with short SHA
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s|^PROJECT_NUMBER\s*=.*|PROJECT_NUMBER         = \"${SHORT_SHA}\"|" "${BUILD_DIR}/Doxyfile"

      - name: Build engine-docs target
        run: cmake --build "${BUILD_DIR}" --target engine-docs

      - name: Add .nojekyll
        run: touch "${HTML_OUT}/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.HTML_OUT }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
